name: Signals engine

on:
  schedule:
    # Backup schedule only — GitHub cron is best-effort and often drifts hours.
    # Primary trigger: external cron hits /api/cron/trigger-engine every 10 min.
    # Odd minutes avoid peak queue times at :00 and :30 UTC.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [run-engine]

concurrency:
  group: signals-engine
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Scan markets
        run: python -m signals.run
        env:
          SEALION_API_KEY: ${{ secrets.SEALION_API_KEY }}
          SEALION_API_KEY1: ${{ secrets.SEALION_API_KEY1 }}
          SEALION_API_KEY2: ${{ secrets.SEALION_API_KEY2 }}
          SEALION_API_KEY3: ${{ secrets.SEALION_API_KEY3 }}
          SEALION_API_KEY4: ${{ secrets.SEALION_API_KEY4 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
