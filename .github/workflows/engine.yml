name: Signals engine

on:
  schedule:
    # Every 10 minutes. Candles are 1h, so most runs see the same closed bar —
    # the dedup check in signals/run.py keeps repeated setups from being
    # stored (or alerted) twice.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Scan markets
        run: python -m signals.run
        env:
          SEALION_API_KEY: ${{ secrets.SEALION_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
