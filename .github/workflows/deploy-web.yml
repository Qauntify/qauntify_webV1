name: Deploy web to Vercel

# Auto-deploys the Next.js app on pushes that touch web/.
# Requires secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Project Root Directory on Vercel must be `web`.
#
# Build on Vercel (not --prebuilt): production env vars marked Sensitive
# are unavailable to `vercel build` in CI, which emptied NEXT_PUBLIC_* and
# took the site down with "URL and Key are required".

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-web-vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@50

      - name: Deploy to Vercel (cloud build)
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
